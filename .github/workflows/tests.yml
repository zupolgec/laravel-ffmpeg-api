name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', laravel: '10', testbench: '^8.0' }
          - { php: '8.3', laravel: '10', testbench: '^8.0' }
          - { php: '8.2', laravel: '11', testbench: '^9.0' }
          - { php: '8.3', laravel: '11', testbench: '^9.0' }
          - { php: '8.4', laravel: '11', testbench: '^9.0' }
          - { php: '8.2', laravel: '12', testbench: '^10.0' }
          - { php: '8.3', laravel: '12', testbench: '^10.0' }
          - { php: '8.4', laravel: '12', testbench: '^10.0' }
          - { php: '8.5', laravel: '12', testbench: '^10.0' }

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Pin Laravel/Testbench for this matrix leg
        run: composer require --dev "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist --prefer-stable

      - name: Unit tests
        run: vendor/bin/pest --testsuite=Unit
